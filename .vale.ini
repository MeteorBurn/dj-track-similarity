StylesPath = .vale/styles
MinAlertLevel = suggestion
Packages = https://github.com/tbhb/vale-ai-tells/releases/download/v1.19.0/ai-tells.zip
Vocab = DJTrackSimilarity

# The docs npm scripts pass README.md plus docs/dj-track-similarity Markdown.
[*.md]
BasedOnStyles = ai-tells
BlockIgnores = (?m)^(> (Audience|Goal|Type): .+)$

# ai-tells is an English prose style. Its punctuation and syntax rules do not
# apply to the Russian localization; VitePress still validates these pages.
[docs/dj-track-similarity/ru/**/*.md]
BasedOnStyles =
