<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/static/styles.css?v=rhythm-lab-20260702-source-status-line-compact" />
  <script src="/static/app.js?v=rhythm-lab-20260702-source-status-line-compact" defer></script>
  <title>Rhythm Lab</title>
</head>
<body>
  <header class="app-shell">
    <section class="top-bar">
      <div>
        <strong>Rhythm Lab</strong>
        <button id="shutdownLab" type="button" class="icon-button rhythm-lab-stop-button" title="Stop Rhythm Lab" aria-label="Stop Rhythm Lab">
          <svg class="lucide lucide-power" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v10" />
            <path d="M18.4 6.6a9 9 0 1 1-12.77.04" />
          </svg>
        </button>
        <span class="classifier-profile classifier-gradient" id="activeProfileName">No profile selected</span>
      </div>
      <div class="profile-controls">
        <select id="profileSelect" title="Active classifier profile"></select>
        <button id="newProfile" type="button">New profile</button>
        <button id="settingsTab" type="button">Profile Settings</button>
        <button id="archiveProfile" type="button">Archive</button>
      </div>
    </section>

    <section class="source-row">
      <input id="sourcePath" class="source-path" placeholder="C:\db\abstracted.sqlite" title="Existing dj-track-similarity SQLite database. Opened read-only." />
      <button id="chooseSource" type="button" title="Choose existing SQLite database">Browse</button>
      <button id="loadSource" type="button" title="Load selected source database">Load database</button>
      <div class="source-actions">
        <button id="trainingTab" type="button" class="tab-button">
          <svg class="lucide lucide-dumbbell" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.4 14.4 9.6 9.6" />
            <path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l2.829-2.829a2 2 0 1 1 2.828 2.829z" />
            <path d="m21.5 21.5-1.4-1.4" />
            <path d="M3.9 3.9 2.5 2.5" />
            <path d="M5.343 8.172a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828z" />
            <path d="m9.6 14.4 4.8-4.8" />
            <path d="m14.4 14.4 1.4 1.4" />
            <path d="m8.2 8.2 1.4 1.4" />
          </svg>
          Training
        </button>
        <button id="refreshCandidates" type="button" class="icon-button refresh-candidates" title="Refresh candidates" aria-label="Refresh candidates">
          <svg class="lucide lucide-refresh-cw" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 15.74-5.74L21 8" />
            <path d="M21 3v5h-5" />
            <path d="M21 12a9 9 0 0 1-15.74 5.74L3 16" />
            <path d="M3 21v-5h5" />
          </svg>
        </button>
        <button id="trainRefresh" type="button" class="icon-button train-refresh" title="Train and refresh candidates" aria-label="Train and refresh candidates">
          <svg class="lucide lucide-brain" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
            <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
            <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4" />
            <path d="M17.599 6.5a3 3 0 0 0 .399-1.375" />
            <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
            <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
            <path d="M19.938 10.5a4 4 0 0 1 .585.396" />
            <path d="M6 18a4 4 0 0 1-1.967-.516" />
            <path d="M19.967 17.484A4 4 0 0 1 18 18" />
          </svg>
        </button>
        <button id="promoteClassifier" type="button" class="icon-button promote-classifier" title="Train a combined model before promoting" aria-label="Promote classifier">
          <svg class="lucide lucide-upload" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" x2="12" y1="3" y2="15" />
          </svg>
        </button>
      </div>
      <span id="refreshCandidatesStatus" class="meta source-status-line"></span>
    </section>

    <nav class="tabs">
      <button id="libraryTab" type="button" class="tab-button active">
        <svg class="lucide lucide-library-big" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="8" height="18" x="3" y="3" rx="1" />
          <path d="M7 3v18" />
          <path d="M20.4 18.9c.2.7-.2 1.4-.9 1.6l-3.7 1c-.7.2-1.4-.2-1.6-.9L9.1 5.1c-.2-.7.2-1.4.9-1.6l3.7-1c.7-.2 1.4.2 1.6.9Z" />
        </svg>
        Library
      </button>
      <button id="candidatesTab" type="button" class="tab-button">
        <svg class="lucide lucide-sparkles" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594Z" />
          <path d="M20 2v4" />
          <path d="M22 4h-4" />
          <circle cx="4" cy="20" r="2" />
        </svg>
        Candidates
      </button>
      <button id="likedTab" type="button" class="tab-button">
        <svg class="lucide lucide-heart" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
        </svg>
        Liked
      </button>
      <button id="collectionTab" type="button" class="tab-button">
        <svg class="lucide lucide-list-checks" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 17 2 2 4-4" />
          <path d="M13 6h8" />
          <path d="M13 12h8" />
          <path d="M13 18h8" />
          <path d="m3 7 2 2 4-4" />
        </svg>
        Collection
      </button>
      <span id="collectionControls" class="collection-controls" hidden>
        <select id="collectionSelect" title="Review collection"></select>
        <button id="deleteCollection" type="button" class="icon-button delete-collection" title="Delete selected collection. Labels remain in the active profile." aria-label="Delete selected collection">
          <svg class="lucide lucide-trash-2" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 11v6" />
            <path d="M14 11v6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M3 6h18" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
        </button>
        <span id="collectionStatus" class="meta"></span>
      </span>
    </nav>

    <section id="commonFilters" class="filters">
      <input id="query" placeholder="search path/title/artist" />
      <input id="bpmMin" type="number" min="0" step="0.1" placeholder="BPM from" title="Minimum Sonara BPM. Leave blank for no lower bound." />
      <input id="bpmMax" type="number" min="0" step="0.1" placeholder="BPM to" title="Maximum Sonara BPM. Leave blank for no upper bound." />
      <select id="label"></select>
    </section>

    <section id="candidateFilters" class="filters candidate-filters-placeholder">
      <select id="libraryOrder" title="Library order">
        <option value="normal" selected>Normal order</option>
        <option value="random">Random</option>
      </select>
      <button id="shuffleLibraryOrder" type="button" class="icon-button shuffle-library-order" title="Shuffle random library order" aria-label="Shuffle random library order">
        <svg class="lucide lucide-shuffle" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m18 14 4 4-4 4" />
          <path d="m18 2 4 4-4 4" />
          <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7L14 7.7C14.8 6.6 16 6 17.4 6H22" />
          <path d="M2 6h1.9c.7 0 1.4.3 1.9.8L8 9" />
          <path d="M11.7 14.9 14 16.3c.8 1.1 2 1.7 3.4 1.7H22" />
        </svg>
      </button>
      <select id="candidatePredicted"></select>
      <select id="candidateMinBroken">
        <option value="positive_highest" selected>highest positive probability</option>
        <option value="negative_highest">highest negative probability</option>
        <option value="balanced">uncertain / balanced</option>
      </select>
      <input id="candidateMinPositive" type="number" min="0" max="1" step="0.05" value="0" title="Minimum positive probability" />
    </section>

    <section class="pager">
      <select id="pageSize">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="500">500</option>
      </select>
      <button id="prevPage" type="button">Prev</button>
      <button id="nextPage" type="button">Next</button>
      <input id="pageNumber" class="page-number" type="number" min="1" step="1" value="1" title="Page number" />
      <button id="load" type="button">Load</button>
      <span id="pageInfo" class="meta"></span>
      <span id="summary" class="summary-strip"></span>
    </section>
  </header>

  <main>
    <section id="guidancePanel" class="guidance-panel"></section>
    <section id="settingsPanel" class="settings-panel" hidden>
      <div class="settings-grid">
        <form id="profileForm" class="tool-panel">
          <h2>Profile</h2>
          <label>Name <input id="profileNameInput" /></label>
          <label>Description <textarea id="profileDescriptionInput"></textarea></label>
          <label>Artifact folder <input id="profileArtifactDirInput" /></label>
          <label>Artifact prefix <input id="profileArtifactPrefixInput" /></label>
          <label>New labels to train <input id="profileTrainingMinAddedInput" type="number" min="1" step="1" value="50" /></label>
          <button type="submit">Save profile</button>
        </form>
        <form id="renameLabelForm" class="tool-panel">
          <h2>Rename label key</h2>
          <label>Current label <select id="renameLabelSelect"></select></label>
          <label>New key <input id="renameLabelKeyInput" placeholder="lead_vocal" /></label>
          <label>Display name <input id="renameLabelNameInput" placeholder="Lead Vocal" /></label>
          <button type="submit">Rename label</button>
        </form>
      </div>
    </section>
    <section id="trainingPanel" class="training-panel" hidden></section>
    <section id="tracks"></section>
  </main>

  <dialog id="profileDialog">
    <form id="newProfileForm" method="dialog" class="dialog-form">
      <h2>New classifier profile</h2>
      <label>Key <input id="newProfileKey" placeholder="vocal_presence" required /></label>
      <label>Name <input id="newProfileName" placeholder="Vocal Presence" required /></label>
      <label>Type
        <select id="newProfileType">
          <option value="binary" selected>Binary</option>
          <option value="multiclass">Multiclass</option>
        </select>
      </label>
      <label>Description <textarea id="newProfileDescription" placeholder="What this classifier should detect"></textarea></label>
      <label>Artifact folder <input id="newProfileArtifactDir" placeholder="tools/rhythm-lab/artifacts/vocal-presence" /></label>
      <label>New labels to train <input id="newProfileTrainingMinAdded" type="number" min="1" step="1" value="50" required /></label>
      <div id="binaryLabelGrid" class="label-grid">
        <label>Positive key <input id="newPositiveKey" placeholder="vocal" required /></label>
        <label>Positive name <input id="newPositiveName" placeholder="Vocal" required /></label>
        <label>Negative key <input id="newNegativeKey" placeholder="instrumental" required /></label>
        <label>Negative name <input id="newNegativeName" placeholder="Instrumental" required /></label>
        <label>Review key <input id="newReviewKey" placeholder="uncertain" /></label>
        <label>Review name <input id="newReviewName" placeholder="Uncertain" /></label>
      </div>
      <div id="multiclassLabelEditor" class="multiclass-label-editor" hidden>
        <div id="multiclassLabelRows" class="multiclass-label-rows">
          <div class="multiclass-label-row">
            <label>Class key <input class="multiclass-label-key" placeholder="euphoric" /></label>
            <label>Class name <input class="multiclass-label-name" placeholder="Euphoric" /></label>
            <label>Description <textarea class="multiclass-label-description" placeholder="Bright, uplifting, hands-in-the-air mood"></textarea></label>
          </div>
          <div class="multiclass-label-row">
            <label>Class key <input class="multiclass-label-key" placeholder="dark" /></label>
            <label>Class name <input class="multiclass-label-name" placeholder="Dark" /></label>
            <label>Description <textarea class="multiclass-label-description" placeholder="Darker, tense, low-light mood"></textarea></label>
          </div>
        </div>
        <button id="addMulticlassLabel" type="button">Add class</button>
      </div>
      <menu>
        <button id="cancelProfileButton" type="button" value="cancel">Cancel</button>
        <button id="createProfileButton" type="submit" value="default">Create</button>
      </menu>
    </form>
  </dialog>
</body>
</html>
